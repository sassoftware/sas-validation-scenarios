# Source: locust-k8s-operator/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-operator-locust-k8s-operator
  labels:
    helm.sh/chart: locust-k8s-operator-0.8.0
    app.kubernetes.io/name: locust-k8s-operator
    app.kubernetes.io/instance: locust-operator
    app.kubernetes.io/version: "0.8.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: locust-k8s-operator
      app.kubernetes.io/instance: locust-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: locust-k8s-operator
        app.kubernetes.io/instance: locust-operator
    spec:
      serviceAccountName: locust-operator-locust-k8s-operator
      containers:
        - name: locust-k8s-operator
          image: "lotest/locust-k8s-operator:0.8.0"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: micronaut-port
              containerPort: 8080
          livenessProbe:
            failureThreshold: 1
            httpGet:
              path: /health
              port: micronaut-port
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 10
          readinessProbe:
            failureThreshold: 1
            httpGet:
              path: /health
              port: micronaut-port
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
          resources: {}
          env:
            - name: APP_SERVER_PORT
              value: "8080"
            # K8s config
            - name: K8S_NAMESPACE
              value: ${replace_NAMESPACE}
            # Kafka config
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "localhost:9092"
            - name: KAFKA_SECURITY_ENABLED
              value: "false"

            # Load generation job config
            - name: JOB_TTL_SECONDS_AFTER_FINISHED
              value: ""

            # Load generation resource config
            - name: POD_CPU_REQUEST
              value: "2000m"
            - name: POD_MEM_REQUEST
              value: "1024Mi"
            - name: POD_EPHEMERAL_REQUEST
              value: "30M"
            - name: POD_CPU_LIMIT
              value: "3500m"
            - name: POD_MEM_LIMIT
              value: "2048Mi"
            - name: POD_EPHEMERAL_LIMIT
              value: "50M"
            - name: ENABLE_AFFINITY_CR_INJECTION
              value: "true"
            - name: ENABLE_TAINT_TOLERATIONS_CR_INJECTION
              value: "true"

            # Metrics Exporter config
            - name: METRICS_EXPORTER_IMAGE
              value: "containersol/locust_exporter:v0.5.0"
            - name: METRICS_EXPORTER_PORT
              value: "9646"
            - name: METRICS_EXPORTER_IMAGE_PULL_POLICY
              value: "IfNotPresent"
            - name: METRICS_EXPORTER_CPU_REQUEST
              value: "250m"
            - name: METRICS_EXPORTER_MEM_REQUEST
              value: "128Mi"
            - name: METRICS_EXPORTER_EPHEMERAL_REQUEST
              value: "30M"
            - name: METRICS_EXPORTER_CPU_LIMIT
              value: "250m"
            - name: METRICS_EXPORTER_MEM_LIMIT
              value: "128Mi"
            - name: METRICS_EXPORTER_EPHEMERAL_LIMIT
              value: "50M"

            # Metric config
            - name: METRICS_ENABLE
              value: "true"
            - name: METRICS_WEB_ENABLE
              value: "true"
            - name: METRICS_JVM_ENABLE
              value: "true"
            - name: METRICS_UPTIME_ENABLE
              value: "true"
            - name: METRICS_PROCESSOR_ENABLE
              value: "true"
            - name: METRICS_FILES_ENABLE
              value: "false"
            - name: METRICS_LOGBACK_ENABLE
              value: "false"
            - name: METRICS_EXECUTOR_ENABLE
              value: "false"
            - name: METRICS_PROMETHEUS_STEP
              value: "PT30S"
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: locusttests.locust.io
spec:
  conversion:
    strategy: None
  group: locust.io
  names:
    kind: LocustTest
    listKind: LocustTestList
    plural: locusttests
    shortNames:
      - lotest
    singular: locusttest
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - description: Master pod command seed
          jsonPath: .spec.masterCommandSeed
          name: master_cmd
          type: string
        - description: Number of requested worker pods
          jsonPath: .spec.workerReplicas
          name: worker_replica_count
          type: integer
        - description: Locust image
          jsonPath: .spec.image
          name: Image
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1
      schema:
        openAPIV3Schema:
          properties:
            metadata:
              properties:
                name:
                  pattern: ^[a-z[]+[-a-z0-9[]*\.[-a-z0-9[]+$
                  type: string
              type: object
            spec:
              properties:
                affinity:
                  description: Affinity information to be attached to pods
                  properties:
                    nodeAffinity:
                      description: Kubernetes node affinity to be attached to pods
                      properties:
                        requiredDuringSchedulingIgnoredDuringExecution:
                          additionalProperties:
                            type: string
                          description: Kubernetes node affinity to be attached to pods
                          type: object
                      type: object
                  type: object
                annotations:
                  description: Annotations attached to deployed pods
                  properties:
                    master:
                      additionalProperties:
                        type: string
                      description: Annotations attached to the master pod
                      type: object
                    worker:
                      additionalProperties:
                        type: string
                      description: Annotations attached to worker pods
                      type: object
                  type: object
                configMap:
                  description: Configuration map name containing the test
                  type: string
                image:
                  description: Locust image
                  type: string
                imagePullPolicy:
                  description: Image pull policy
                  enum:
                    - Always
                    - IfNotPresent
                    - Never
                  type: string
                imagePullSecrets:
                  description: Secrets for pulling images from private registries
                  items:
                    type: string
                  type: array
                labels:
                  description: Labels attached to deployed pods
                  properties:
                    master:
                      additionalProperties:
                        type: string
                      description: Labels attached to the master pod
                      type: object
                    worker:
                      additionalProperties:
                        type: string
                      description: Labels attached to worker pods
                      type: object
                  type: object
                masterCommandSeed:
                  description: Master pod command seed
                  type: string
                tolerations:
                  description: Taint toleration information to be attached to pods
                  items:
                    properties:
                      effect:
                        description: Toleration effect
                        enum:
                          - NoSchedule
                          - PreferNoSchedule
                          - NoExecute
                        type: string
                      key:
                        description: Toleration key
                        type: string
                      operator:
                        description: Toleration evaluation operator
                        enum:
                          - Exists
                          - Equal
                        type: string
                      value:
                        description: Toleration value
                        type: string
                    required:
                      - key
                      - operator
                      - effect
                    type: object
                  type: array
                workerCommandSeed:
                  description: Worker pod command seed
                  type: string
                workerReplicas:
                  default: 1
                  description: Number of worker pods to spawn
                  maximum: 500
                  minimum: 1
                  type: integer
              required:
                - masterCommandSeed
                - workerCommandSeed
                - workerReplicas
                - image
              type: object
          type: object
      served: true
      storage: true
