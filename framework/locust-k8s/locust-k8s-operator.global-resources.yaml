# ClusterRole,CustomResourceDefinition
---
# Source: locust-k8s-operator/templates/serviceaccount-and-roles.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: locust-operator-locust-k8s-operator
rules:
  - apiGroups: [locust.io]
    resources:
      - locusttests
    verbs: ["*"]
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: locusttests.locust.io
spec:
  conversion:
    strategy: None
  group: locust.io
  names:
    kind: LocustTest
    listKind: LocustTestList
    plural: locusttests
    shortNames:
      - lotest
    singular: locusttest
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - description: Master pod command seed
          jsonPath: .spec.masterCommandSeed
          name: master_cmd
          type: string
        - description: Number of requested worker pods
          jsonPath: .spec.workerReplicas
          name: worker_replica_count
          type: integer
        - description: Locust image
          jsonPath: .spec.image
          name: Image
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1
      schema:
        openAPIV3Schema:
          properties:
            metadata:
              properties:
                name:
                  pattern: ^[a-z[]+[-a-z0-9[]*\.[-a-z0-9[]+$
                  type: string
              type: object
            spec:
              properties:
                affinity:
                  description: Affinity information to be attached to pods
                  properties:
                    nodeAffinity:
                      description: Kubernetes node affinity to be attached to pods
                      properties:
                        requiredDuringSchedulingIgnoredDuringExecution:
                          additionalProperties:
                            type: string
                          description: Kubernetes node affinity to be attached to pods
                          type: object
                      type: object
                  type: object
                annotations:
                  description: Annotations attached to deployed pods
                  properties:
                    master:
                      additionalProperties:
                        type: string
                      description: Annotations attached to the master pod
                      type: object
                    worker:
                      additionalProperties:
                        type: string
                      description: Annotations attached to worker pods
                      type: object
                  type: object
                configMap:
                  description: Configuration map name containing the test
                  type: string
                image:
                  description: Locust image
                  type: string
                imagePullPolicy:
                  description: Image pull policy
                  enum:
                    - Always
                    - IfNotPresent
                    - Never
                  type: string
                imagePullSecrets:
                  description: Secrets for pulling images from private registries
                  items:
                    type: string
                  type: array
                labels:
                  description: Labels attached to deployed pods
                  properties:
                    master:
                      additionalProperties:
                        type: string
                      description: Labels attached to the master pod
                      type: object
                    worker:
                      additionalProperties:
                        type: string
                      description: Labels attached to worker pods
                      type: object
                  type: object
                masterCommandSeed:
                  description: Master pod command seed
                  type: string
                tolerations:
                  description: Taint toleration information to be attached to pods
                  items:
                    properties:
                      effect:
                        description: Toleration effect
                        enum:
                          - NoSchedule
                          - PreferNoSchedule
                          - NoExecute
                        type: string
                      key:
                        description: Toleration key
                        type: string
                      operator:
                        description: Toleration evaluation operator
                        enum:
                          - Exists
                          - Equal
                        type: string
                      value:
                        description: Toleration value
                        type: string
                    required:
                      - key
                      - operator
                      - effect
                    type: object
                  type: array
                workerCommandSeed:
                  description: Worker pod command seed
                  type: string
                workerReplicas:
                  default: 1
                  description: Number of worker pods to spawn
                  maximum: 500
                  minimum: 1
                  type: integer
              required:
                - masterCommandSeed
                - workerCommandSeed
                - workerReplicas
                - image
              type: object
          type: object
      served: true
      storage: true
---