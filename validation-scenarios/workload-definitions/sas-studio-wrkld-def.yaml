workload-definitions:
  workload-definition-specs:
    - name: sas-studio 
      description: SAS Studio Validation Scenario
      custom-resource-spec:
        namespace: testing
        config-map-name: sas-studio-map
        k8s-operator: locust-k8s-operator.yaml
        workloads:
          - name: st-runsleep01
            scenario-config: application-scenarios/sas-studio/scenario-config.yaml
            path: application-scenarios/sas-studio/tests
            task: st_runsleep01.py
            csv: stats.csv
            users: 1
            spawn-rate: 3
            iterations: 1
            worker-replicas: 1
          - name: st-runsleep02
            scenario-config: application-scenarios/sas-studio/scenario-config.yaml
            path: application-scenarios/sas-studio/tests
